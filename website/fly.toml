# Fly.io config — Linda marketing site + interactive demo.
#
# Static HTML/CSS/JS served from nginx (see Dockerfile + nginx.conf in
# this directory). Separate Fly app from the SPA (linda-staging-app)
# and the backend (linda-staging) — this deploys at its own URL and
# its own scaling profile (no auth, no DB, no Redis).

app = "linda-marketing"
primary_region = "iad"

[build]
  dockerfile = "Dockerfile"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 1

  [[http_service.checks]]
    interval = "30s"
    timeout = "5s"
    grace_period = "10s"
    method = "GET"
    path = "/healthz"

[[vm]]
  size = "shared-cpu-1x"
  memory = "256mb"
