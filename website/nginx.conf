server {
    listen 8080 default_server;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # gzip — compresses CSS/JS/SVG/HTML over the wire. Demo.css and
    # demo.js are 100+ KB each unminified; gzip cuts them by ~70%.
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        application/xml
        application/xml+rss
        application/rss+xml
        image/svg+xml;

    # Cache headers — short for HTML (so demo updates are seen quickly),
    # long for static assets (cache-busted via filename hashes if/when
    # the build pipeline gains them; otherwise readers will see fresh
    # CSS/JS on a cold-load).
    location / {
        try_files $uri $uri/ $uri.html =404;
        add_header Cache-Control "no-cache, must-revalidate" always;
    }

    location ~* \.(?:css|js|png|jpg|jpeg|gif|svg|webp|ico|woff2?|ttf|eot)$ {
        expires 1h;
        add_header Cache-Control "public, max-age=3600" always;
    }

    # Health probe for Fly. Returns 200 with no body.
    location = /healthz {
        access_log off;
        return 200;
    }
}
