# Fly.io config — LINDA dashboard SPA (Next.js).
#
# Separate Fly app from the FastAPI backend (linda-staging.fly.dev).
# The SPA proxies /api/* to the backend via next.config.mjs rewrites,
# so requests look same-origin to the browser even though the auth +
# data layer live on the other Fly app.

app = "linda-staging-app"
primary_region = "iad"

[build]
  dockerfile = "Dockerfile"

  # NEXT_PUBLIC_* env vars are inlined by Next.js at build time, so the
  # Clerk publishable key has to be present during `npm run build` —
  # not just as a Fly runtime secret. The publishable key is non-secret
  # by Clerk's design (it ships in every browser bundle), so persisting
  # it here keeps every deploy buildable without a CLI build-arg.
  #
  # LINDA_BACKEND_URL is the same story: next.config.mjs evaluates
  # rewrites() at build time, so the destination URL gets baked in. The
  # runtime [env] entry below is harmless but no longer load-bearing.
  [build.args]
    NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY = "pk_test_Z2xhZC1jaWNhZGEtMS5jbGVyay5hY2NvdW50cy5kZXYk"
    LINDA_BACKEND_URL = "https://linda-staging.fly.dev"

# Placeholder release hook. The SPA is a Next standalone build and
# doesn't run DB migrations, but having a release_command wired now
# gives us a place to bolt on Sentry source-map upload, static-asset
# CDN cache purge, or a smoke probe later without changing fly config
# under pressure.
[deploy]
  release_command = "echo 'spa release ok'"

[env]
  NODE_ENV = "production"
  # Where the SPA proxies /api/* to. Keeps Clerk + cookies same-origin.
  LINDA_BACKEND_URL = "https://linda-staging.fly.dev"
  NEXT_PUBLIC_CLERK_SIGN_IN_URL = "/sign-in"
  NEXT_PUBLIC_CLERK_SIGN_UP_URL = "/sign-up"
  NEXT_PUBLIC_CLERK_SIGN_IN_FALLBACK_REDIRECT_URL = "/dashboard"
  NEXT_PUBLIC_CLERK_SIGN_UP_FALLBACK_REDIRECT_URL = "/dashboard"

[http_service]
  internal_port = 3001
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 1

  [[http_service.checks]]
    interval = "30s"
    timeout = "5s"
    grace_period = "30s"
    method = "GET"
    path = "/"

[[vm]]
  size = "shared-cpu-1x"
  memory = "512mb"
