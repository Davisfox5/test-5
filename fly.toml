# Fly.io config — LINDA staging
#
# One Fly app, three processes: api / worker / beat. External services:
# Postgres on Neon, Redis on Upstash, audio staging on Tigris (Fly's S3-
# compatible storage, attached via `fly storage create`).
#
# Production gets its own fly.production.toml when we cut over.

app = "linda-staging"
primary_region = "iad"

[build]
  dockerfile = "Dockerfile"

[deploy]
  release_command = "alembic -c backend/alembic.ini upgrade head"
  strategy = "rolling"

[env]
  ENVIRONMENT = "staging"
  LOG_FORMAT = "json"
  LOG_LEVEL = "INFO"
  # Skip eager pyannote/SpeechBrain preload at worker boot — staging
  # has no model-cache volume yet, so models would re-download on every
  # restart. They still load lazily on the first audio task.
  LINDA_WORKER_WARMUP = "0"

[processes]
  api    = "uvicorn backend.app.main:app --host 0.0.0.0 --port 8000"
  worker = "celery -A backend.app.tasks:celery_app worker --loglevel=INFO --concurrency=2"
  beat   = "celery -A backend.app.tasks:celery_app beat --loglevel=INFO"

[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 1
  processes = ["api"]

  [[http_service.checks]]
    interval = "30s"
    timeout = "5s"
    grace_period = "60s"
    method = "GET"
    path = "/api/v1/ready"

[[vm]]
  size = "shared-cpu-1x"
  memory = "2gb"
  processes = ["api"]

[[vm]]
  size = "shared-cpu-2x"
  memory = "4gb"
  processes = ["worker"]

[[vm]]
  size = "shared-cpu-1x"
  memory = "1gb"
  processes = ["beat"]
