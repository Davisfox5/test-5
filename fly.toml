# Fly.io config — LINDA staging
#
# Four processes: api / worker / beat / siprec_srs. External services:
# Postgres on Neon, Redis on Upstash, audio staging on Tigris (Fly's S3-
# compatible storage, attached via `fly storage create`).
#
# The siprec_srs process is the Stream 1 Session Recording Server
# (SIPREC, RFC 7866) — a separate FreeSWITCH userspace machine that
# terminates SIP-TLS + SRTP from the customer's SBC and forks plaintext
# audio frames into the api process. Its image is built from
# backend/app/services/telephony/siprec_srs/Dockerfile and pushed under
# the role tag declared below; the user must build + push that image
# before the first deploy can succeed (see USER_TODO.md).
#
# Production gets its own fly.production.toml when we cut over.

app = "linda-staging"
primary_region = "iad"

[build]
  dockerfile = "Dockerfile"

[deploy]
  release_command = "alembic -c backend/alembic.ini upgrade head"
  strategy = "rolling"

[env]
  ENVIRONMENT = "staging"
  LOG_FORMAT = "json"
  LOG_LEVEL = "INFO"
  # Skip eager pyannote/SpeechBrain preload at worker boot — staging
  # has no model-cache volume yet, so models would re-download on every
  # restart. They still load lazily on the first audio task.
  LINDA_WORKER_WARMUP = "0"
  # uvicorn / celery / alembic run as console-script entrypoints whose
  # sys.path doesn't include CWD; this makes backend.app.* importable.
  # Mirrors the ENV in the Dockerfile (belt-and-braces).
  PYTHONPATH = "/home/linda/app"

[processes]
  # `--proxy-headers --forwarded-allow-ips=*` makes uvicorn honor Fly's
  # X-Forwarded-Proto / X-Forwarded-Host / X-Forwarded-For. Without these
  # flags, `request.base_url` reports `http://...` (Fly terminates TLS
  # at the proxy), which breaks any absolute URL the backend mints —
  # OAuth redirect_uri being the load-bearing example: Azure AD enforces
  # strict scheme matching and rejects http→https mismatches with
  # AADSTS50011. The `*` allow list is fine here because nothing
  # external reaches uvicorn directly; Fly's edge is the only hop.
  # Two workers per VM lets a slow request not block all others — the
  # 2 GB shared-cpu-1x has ~600 MB headroom per worker after the venv
  # and shared libs. Bump to 4 only if you upsize the machine.
  api    = "uvicorn backend.app.main:app --host 0.0.0.0 --port 8000 --workers 2 --proxy-headers --forwarded-allow-ips=*"
  # Celery on shared-cpu-2x: I/O heavy work (Anthropic, Deepgram, S3,
  # Postgres) means concurrency higher than vCPU count is the right
  # call. 4 keeps memory comfortable on the 4 GB VM.
  worker = "celery -A backend.app.tasks:celery_app worker --loglevel=INFO --concurrency=4"
  beat   = "celery -A backend.app.tasks:celery_app beat --loglevel=INFO --schedule=/data/celerybeat-schedule"
  # SIPREC SRS — uses a *different image* from api/worker/beat. The
  # build/image directives below the [[vm]] blocks override the default
  # Dockerfile for this process group. Until the user runs
  # ``flyctl deploy --config fly.toml --image $REGISTRY/linda-siprec-srs:tag``
  # this process will fail to start; the api/worker/beat processes
  # are unaffected.
  siprec_srs = "/usr/local/bin/entrypoint.sh freeswitch -nonat -nf"

# Persistent storage for celerybeat-schedule. Without this the beat
# scheduler resets its "last fired" state on every restart, which
# means periodic tasks can fire twice (or skip a window). Volume
# created via:  flyctl volumes create linda_beat_data -r iad -s 1
[[mounts]]
  source      = "linda_beat_data"
  destination = "/data"
  processes   = ["beat"]

# Auto-recover crashed worker / beat machines instead of parking them
# in 'stopped' state. on-failure means non-zero exits restart; clean
# exits (e.g. flyctl machine stop) do not.
[[restart]]
  policy    = "on-failure"
  retries   = 10
  processes = ["worker", "beat"]

[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 1
  processes = ["api"]

  # Cheap liveness probe (no I/O). Previously pointed at /api/v1/ready,
  # which runs SELECT 1 + Redis PING + Qdrant /readyz + Deepgram /projects
  # + S3 head_bucket on every tick — that's ~120k Deepgram round-trips a
  # month just for healthchecks. /api/v1/health returns instantly with
  # no upstream calls; deep readiness still runs on deploy via /ready/deep.
  [[http_service.checks]]
    interval = "30s"
    timeout = "5s"
    grace_period = "60s"
    method = "GET"
    path = "/api/v1/health"

[[vm]]
  size = "shared-cpu-1x"
  memory = "2gb"
  processes = ["api"]

[[vm]]
  size = "shared-cpu-2x"
  memory = "4gb"
  processes = ["worker"]

[[vm]]
  size = "shared-cpu-1x"
  memory = "1gb"
  processes = ["beat"]

# SIPREC SRS sizing. FreeSWITCH userspace mode burns ~25 MHz per
# concurrent call for SRTP termination + audio fork; performance-2x
# (4 vCPU / 8 GB) handles ~150 concurrent calls comfortably. Per-customer
# load limits are enforced at the SBC, not here. Down-size to
# performance-1x for a single-customer pilot; up-size to performance-4x
# for >300 concurrent calls.
[[vm]]
  size = "performance-2x"
  memory = "8gb"
  processes = ["siprec_srs"]

# UDP services for SIP-TLS signaling and the RTP port range. Fly
# Edge does TCP/HTTP load-balancing transparently but UDP needs an
# explicit declaration. The port range is intentionally narrow (16k)
# so each SRS machine's NAT mapping table stays small; high-volume
# tenants get a dedicated machine. SIP-TLS is registered on the same
# 5061 the customer's SBC dials directly via the public hostname.
[[services]]
  protocol = "udp"
  internal_port = 5061
  processes = ["siprec_srs"]

  [[services.ports]]
    port = 5061

[[services]]
  protocol = "tcp"
  internal_port = 5061
  processes = ["siprec_srs"]

  [[services.ports]]
    port = 5061
    handlers = ["tls"]
    # No tls_options — Fly's API only accepts ALPN values "h2" or
    # "http/1.1". SIP-TLS doesn't negotiate ALPN, so we let Fly's
    # default handler pass the TLS handshake through unchanged.

# RTP port range — declared as a sidecar service. Fly bills UDP
# services per-port-range, so widening this is a deliberate cost
# decision (see USER_TODO.md → "Procure a Fly machine size capable of
# media processing"). The image's RTP_PORT_MIN/MAX env vars must
# match this range exactly or the SBC will see ICMP unreachable.
[[services]]
  protocol = "udp"
  internal_port = 16384
  processes = ["siprec_srs"]

  [[services.ports]]
    start_port = 16384
    end_port = 32768
