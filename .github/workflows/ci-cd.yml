name: "CI/CD"

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:
    inputs:
      deploy_env:
        description: "Target environment (staging|production)"
        required: false
        default: "staging"

jobs:
  # ── Tests run on every push + PR ──────────────────────────────
  test:
    runs-on: ubuntu-latest

    # Real Postgres for the RLS isolation tests (tests/test_rls_isolation.py)
    # — row-level security doesn't exist in the SQLite fixtures. The suite
    # auto-skips those tests when this service is absent, so removing it
    # silently disables the tenant-isolation gate. Don't.
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: linda_owner
          POSTGRES_PASSWORD: test
          POSTGRES_DB: linda_test
        ports:
          - 55432:5432
        options: >-
          --health-cmd "pg_isready -U linda_owner -d linda_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      OPENAI_API_KEY_DECLAN: ${{ secrets.OPENAI_API_KEY_DECLAN }}
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      SKYVERN_API_KEY: ${{ secrets.SKYVERN_API_KEY }}
      AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
      AZURE_SECRET: ${{ secrets.AZURE_SECRET }}
      AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
      INFRACOST_API_KEY: ${{ secrets.INFRACOST_API_KEY }}
      # Stub envs so backend modules import without talking to real services.
      DATABASE_URL: "postgresql://stub:stub@stub:5432/stub"
      # Owner DSN for the RLS isolation tests (matches the service above).
      TEST_POSTGRES_URL: "postgresql://linda_owner:test@localhost:55432/linda_test"
      ANTHROPIC_API_KEY: "sk-ant-stub"
      JWT_SECRET: "stub"
      REDIS_URL: "redis://localhost:6379/0"
      # Skip the emotion-live tests in CI — model download would make
      # the job 5-10x slower. They run fine in staging after the
      # worker warmup hook fills the HF cache.
      LINDA_EMOTION_TESTS_DISABLED: "1"

    steps:
      - name: "Check out code"
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: "Set up Python"
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: "Install dependencies"
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-asyncio respx

      - name: "Run tests"
        run: pytest -q --ignore=tests/sandbox_demo_ui_test.py

  # ── Build container image on main + manual dispatch ───────────
  # Separate job so failed deploys don't invalidate the test run.
  # No-op gracefully when no registry is configured — lets forks /
  # public contributors run CI without infra access.
  build:
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      image_tag: ${{ steps.meta.outputs.tag }}

    steps:
      - name: "Check out code"
        uses: actions/checkout@v4

      - name: "Compute image tag"
        id: meta
        run: |
          # Use the commit SHA as the image tag so deploys are
          # immutable + each release has a unique name.
          echo "tag=${GITHUB_SHA::12}" >> "$GITHUB_OUTPUT"

      - name: "Set up Docker Buildx"
        if: env.CONTAINER_REGISTRY != ''
        uses: docker/setup-buildx-action@v3
        env:
          CONTAINER_REGISTRY: ${{ vars.CONTAINER_REGISTRY }}

      - name: "Log in to container registry"
        if: env.CONTAINER_REGISTRY != ''
        uses: docker/login-action@v3
        with:
          registry: ${{ env.CONTAINER_REGISTRY }}
          # GHCR accepts the workflow's auto-issued GITHUB_TOKEN as the
          # password when the job has packages:write. No PAT to maintain.
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
        env:
          CONTAINER_REGISTRY: ${{ vars.CONTAINER_REGISTRY }}

      - name: "Build and push backend image"
        if: env.CONTAINER_REGISTRY != ''
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ vars.CONTAINER_REGISTRY }}/linda-backend:${{ steps.meta.outputs.tag }}
            ${{ vars.CONTAINER_REGISTRY }}/linda-backend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            RELEASE_VERSION=${{ steps.meta.outputs.tag }}
        env:
          CONTAINER_REGISTRY: ${{ vars.CONTAINER_REGISTRY }}

      - name: "No-registry notice"
        if: env.CONTAINER_REGISTRY == ''
        run: |
          echo "::notice::CONTAINER_REGISTRY var is unset — skipping image build. Set vars.CONTAINER_REGISTRY in repo settings to enable."
        env:
          CONTAINER_REGISTRY: ${{ vars.CONTAINER_REGISTRY }}

  # ── Auto-deploy to staging on push to main ────────────────────
  # Production requires workflow_dispatch + explicit deploy_env=production
  # so one never happens by accident.
  deploy_staging:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: staging
      url: ${{ vars.STAGING_URL }}
    steps:
      - name: "Check out code"
        uses: actions/checkout@v4

      - name: "Set up flyctl"
        if: env.FLY_API_TOKEN != ''
        uses: superfly/flyctl-actions/setup-flyctl@master
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}

      - name: "Deploy to Fly staging"
        if: env.FLY_API_TOKEN != ''
        run: flyctl deploy --remote-only --app linda-staging
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}

      - name: "Wait for staging /ready/deep"
        if: env.STAGING_URL != ''
        run: |
          # Poll up to 5 minutes for the new version to pass the
          # deep readiness probe. Fails the deploy if not ready.
          for _ in $(seq 1 30); do
            if curl -fsS "$STAGING_URL/api/v1/ready/deep" >/tmp/probe.json; then
              echo "staging is ready:"
              cat /tmp/probe.json
              exit 0
            fi
            sleep 10
          done
          echo "::error::staging did not reach ready/deep within 5 minutes"
          exit 1
        env:
          STAGING_URL: ${{ vars.STAGING_URL }}

      - name: "Staging deploy stub notice"
        if: env.FLY_API_TOKEN == ''
        run: |
          echo "::notice::FLY_API_TOKEN secret unset — skipping deploy. Set via 'flyctl tokens create deploy --app linda-staging' to enable."
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}

  # ── Auto-deploy SPA to staging on push to main ───────────────
  #
  # The SPA (Next.js) is its own Fly app (``linda-staging-app``)
  # because Next.js needs a different runtime + Dockerfile from the
  # FastAPI backend (``linda-staging``). For three days of Phase 3
  # development this job did not exist and SPA changes accumulated
  # in main without ever reaching staging — caught only when
  # `/customers` returned 404 in a Playwright audit. The
  # always-deploy-both invariant is now guarded by this job (mirrors
  # ``deploy_staging`` exactly, just targets the other app + uses the
  # subdir-scoped fly.toml).
  #
  # Runs in parallel with deploy_staging since the two apps are
  # independent — neither depends on the other being up.
  deploy_spa_staging:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: staging
      url: ${{ vars.STAGING_SPA_URL }}
    steps:
      - name: "Check out code"
        uses: actions/checkout@v4

      - name: "Set up flyctl"
        if: env.FLY_API_TOKEN != ''
        uses: superfly/flyctl-actions/setup-flyctl@master
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}

      - name: "Deploy SPA to Fly staging"
        if: env.FLY_API_TOKEN != ''
        # ``--config`` + ``working-directory`` must agree: the build
        # context is ``apps/app/`` (where package.json lives) and the
        # fly.toml at that path declares the right Dockerfile path.
        working-directory: apps/app
        run: flyctl deploy --remote-only --app linda-staging-app
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}

      - name: "Smoke check SPA root"
        if: env.STAGING_SPA_URL != ''
        run: |
          # Cheap proof-of-life: the Next.js app should serve a 200
          # at the root (sign-in page when unauthenticated). Anything
          # else means the deploy failed health checks even if the
          # flyctl command exited cleanly.
          for _ in $(seq 1 18); do
            code=$(curl -fsS -o /dev/null -w "%{http_code}" "$STAGING_SPA_URL/" || echo "000")
            if [ "$code" = "200" ]; then
              echo "SPA staging is serving 200 at /"
              exit 0
            fi
            sleep 10
          done
          echo "::error::SPA did not serve 200 within 3 minutes"
          exit 1
        env:
          STAGING_SPA_URL: ${{ vars.STAGING_SPA_URL }}

      - name: "SPA deploy stub notice"
        if: env.FLY_API_TOKEN == ''
        run: |
          echo "::notice::FLY_API_TOKEN secret unset — skipping SPA deploy."
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}

  # ── Manual promote to production ──────────────────────────────
  deploy_production:
    if: github.event_name == 'workflow_dispatch' && inputs.deploy_env == 'production'
    needs: build
    runs-on: ubuntu-latest
    environment:
      # GitHub environments can require manual approval + enforce
      # main-only deploys. Configure the gates in repo settings.
      name: production
      url: ${{ vars.PRODUCTION_URL }}
    steps:
      - name: "Check out code"
        uses: actions/checkout@v4

      - name: "Invoke production deploy hook"
        if: env.PRODUCTION_DEPLOY_HOOK != ''
        run: |
          curl -fsS -X POST "$PRODUCTION_DEPLOY_HOOK" \
               -H 'Content-Type: application/json' \
               -d "{\"release\":\"${{ needs.build.outputs.image_tag }}\",\"commit\":\"${GITHUB_SHA}\"}"
        env:
          PRODUCTION_DEPLOY_HOOK: ${{ secrets.PRODUCTION_DEPLOY_HOOK }}

      - name: "Wait for production /ready/deep"
        if: env.PRODUCTION_URL != ''
        run: |
          for _ in $(seq 1 60); do
            if curl -fsS "$PRODUCTION_URL/api/v1/ready/deep" >/tmp/probe.json; then
              echo "production is ready:"
              cat /tmp/probe.json
              exit 0
            fi
            sleep 10
          done
          echo "::error::production did not reach ready/deep within 10 minutes"
          exit 1
        env:
          PRODUCTION_URL: ${{ vars.PRODUCTION_URL }}

      - name: "Production deploy stub notice"
        if: env.PRODUCTION_DEPLOY_HOOK == ''
        run: |
          echo "::notice::PRODUCTION_DEPLOY_HOOK secret unset — deploy step is a no-op."
        env:
          PRODUCTION_DEPLOY_HOOK: ${{ secrets.PRODUCTION_DEPLOY_HOOK }}
