name: "CI-CD Pipeline"

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

# Default to read-only; steps that need write opt in explicitly.
permissions:
  contents: read

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest

    # Stub envs so backend modules can import without real services.
    env:
      DATABASE_URL: "postgresql://stub:stub@stub:5432/stub"
      ANTHROPIC_API_KEY: "sk-ant-stub"
      JWT_SECRET: "stub"
      REDIS_URL: "redis://localhost:6379/0"
      DEBUG: "true"

    steps:
      - name: "Check out code"
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: "Set up Python"
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: "Install dependencies"
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
          pip install detect-secrets

      - name: "Secret scan"
        # detect-secrets flags likely committed credentials. When a finding
        # is a known false positive, audit it into .secrets.baseline locally
        # (.secrets.baseline is gitignored).
        run: |
          detect-secrets scan --all-files \
              --exclude-files '^tests/' \
              --exclude-files '^\.secrets\.baseline$' \
              > /tmp/detect-secrets.json
          python - <<'PY'
          import json, sys
          data = json.load(open("/tmp/detect-secrets.json"))
          results = data.get("results", {})
          if results:
              print("::error::detect-secrets found potential secrets:")
              print(json.dumps(results, indent=2))
              sys.exit(1)
          print("No committed secrets detected.")
          PY

      - name: "Run tests"
        run: |
          # Skip the Playwright E2E test in CI — it needs a browser + running
          # server. Run it locally or in a dedicated E2E job.
          pytest --maxfail=1 --disable-warnings -q \
            --ignore=tests/sandbox_demo_ui_test.py \
            2>&1 | tee test_output.log

      - name: "Upload test log on failure"
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: test-output
          path: test_output.log
          retention-days: 7
